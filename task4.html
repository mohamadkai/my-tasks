<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>To-Do List</title>
  <style>
    * { box-sizing: border-box; }

    body{
      margin:0;
      min-height:100vh;
      display:grid;
      place-items:center;
      background:#f5f7fb;
      font-family: Arial, sans-serif;
      padding:20px;
      color:#111827;
    }

    .app{
      width:min(820px,100%);
      background:#fff;
      border-radius:18px;
      box-shadow:0 16px 40px rgba(0,0,0,.08);
      padding:18px;
    }

    .row{
      display:grid;
      grid-template-columns: 1fr 140px;
      gap:10px;
      align-items:end;
    }

    label{
      display:block;
      font-weight:700;
      margin:0 0 6px;
    }

    input, button{
      width:100%;
      padding:12px 14px;
      border-radius:12px;
      border:1px solid #d1d5db;
      font-size:1rem;
      background:#fff;
    }

    input:focus{
      outline:2px solid #93c5fd;
      border-color:#60a5fa;
    }

    button{
      border:none;
      cursor:pointer;
      font-weight:800;
      background:#2563eb;
      color:#fff;
    }

    .panel{
      margin-top:14px;
      border:1px dashed #cbd5e1;
      background:#f8fafc;
      border-radius:12px;
      padding:12px;
      display:grid;
      gap:8px;
    }

    .stats{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      color:#334155;
      font-weight:700;
      direction:ltr;
      text-align:left;
    }

    .actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-top:10px;
    }

    .secondary{
      background:#e5e7eb;
      color:#111827;
      font-weight:800;
    }

    ul{
      margin:0;
      padding:0;
      list-style:none;
      display:grid;
      gap:8px;
    }

    li{
      display:grid;
      grid-template-columns: 1fr auto auto;
      gap:8px;
      align-items:center;
      padding:10px 12px;
      border:1px solid #e5e7eb;
      border-radius:12px;
      background:#fff;
    }

    .title{
      direction:rtl;
      text-align:right;
      line-height:1.5;
      word-break:break-word;
    }

    .done .title{
      text-decoration: line-through;
      color:#6b7280;
    }

    .pill{
      border:1px solid #d1d5db;
      background:#fff;
      border-radius:999px;
      padding:8px 10px;
      font-size:.9rem;
      cursor:pointer;
      font-weight:800;
      color:#111827;
    }

    .pill.danger{
      border-color:#fecaca;
      background:#fff1f2;
      color:#9f1239;
    }

    @media (max-width: 640px){
      .row{
        grid-template-columns:1fr;
      }

      li{
        grid-template-columns: 1fr auto;
      }

      li .pill.danger{
        grid-column: 2;
      }
    }
  </style>
</head>

<body>
  <main class="app">
    <div class="row">
      <div>
        <label for="taskInput">أدخل مهمة</label>
        <input id="taskInput" type="text" placeholder="مثال: مذاكرة محاضرة" />
      </div>

      <div>
        <label>&nbsp;</label>
        <button id="addBtn">إضافة</button>
      </div>
    </div>

    <section class="panel" aria-live="polite">
      <div class="stats" id="stats">Total: 0 | Done: 0 | Left: 0</div>

      <div class="actions">
        <button id="clearDoneBtn" class="secondary">مسح المُنجز</button>
        <button id="clearAllBtn" class="secondary">مسح الكل</button>
      </div>

      <ul id="list"></ul>
    </section>
  </main>

  <script>
    // Get DOM elements
    const taskInput = document.getElementById("taskInput");
    const addBtn = document.getElementById("addBtn");
    const list = document.getElementById("list");
    const stats = document.getElementById("stats");
    const clearDoneBtn = document.getElementById("clearDoneBtn");
    const clearAllBtn = document.getElementById("clearAllBtn");

    // App data
    let tasks = [];

    // Render tasks and update stats
    function renderTasks() {
      list.innerHTML = "";

      if (tasks.length === 0) {
        stats.textContent = "Total: 0 | Done: 0 | Left: 0";
        return;
      }

      tasks.forEach(function (task) {
        const li = document.createElement("li");

        if (task.done) {
          li.classList.add("done");
        }

        const titleSpan = document.createElement("span");
        titleSpan.className = "title";
        titleSpan.textContent = task.title;

        const doneBtn = document.createElement("button");
        doneBtn.className = "pill";
        doneBtn.textContent = task.done ? "إلغاء الإنجاز" : "إنجاز";

        doneBtn.addEventListener("click", function () {
          task.done = !task.done;
          renderTasks();
        });

        const deleteBtn = document.createElement("button");
        deleteBtn.className = "pill danger";
        deleteBtn.textContent = "حذف";

        deleteBtn.addEventListener("click", function () {
          const taskIndex = tasks.findIndex(function (currentTask) {
            return currentTask.id === task.id;
          });

          if (taskIndex !== -1) {
            tasks.splice(taskIndex, 1);
          }

          renderTasks();
        });

        li.appendChild(titleSpan);
        li.appendChild(doneBtn);
        li.appendChild(deleteBtn);
        list.appendChild(li);
      });

      const doneCount = tasks.filter(function (task) {
        return task.done;
      }).length;

      const leftCount = tasks.length - doneCount;

      stats.textContent = `Total: ${tasks.length} | Done: ${doneCount} | Left: ${leftCount}`;
    }

    renderTasks();

    // Handle add button click
    addBtn.addEventListener("click", function () {
      const taskTitle = taskInput.value.trim();

      if (taskTitle === "") {
        return;
      }

      const newTask = {
        id: Date.now(),
        title: taskTitle,
        done: false
      };

      tasks.push(newTask);
      taskInput.value = "";
      renderTasks();
    });

    // Handle clear done button click
    clearDoneBtn.addEventListener("click", function () {
      for (let i = tasks.length - 1; i >= 0; i--) {
        if (tasks[i].done) {
          tasks.splice(i, 1);
        }
      }

      renderTasks();
    });

    // Handle clear all button click
    clearAllBtn.addEventListener("click", function () {
      tasks = [];
      taskInput.value = "";
      renderTasks();
    });
  </script>
</body>
</html>
