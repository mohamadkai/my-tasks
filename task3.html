<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Weekday Planner</title>
  <style>
    * { box-sizing: border-box; }

    body{
      margin:0;
      min-height:100vh;
      display:grid;
      place-items:center;
      background:#f5f7fb;
      font-family: Arial, sans-serif;
      padding:20px;
      color:#111827;
    }

    .app{
      width:min(700px,100%);
      background:#fff;
      border-radius:18px;
      box-shadow:0 16px 40px rgba(0,0,0,.08);
      padding:20px;
    }

    h1{
      margin:0 0 12px;
      font-size:1.3rem;
    }

    .row{
      display:grid;
      grid-template-columns:1fr 140px;
      gap:10px;
      align-items:end;
    }

    label{
      display:block;
      font-weight:700;
      margin-bottom:6px;
    }

    input, button{
      width:100%;
      padding:12px 14px;
      border-radius:12px;
      border:1px solid #d1d5db;
      font-size:1rem;
    }

    input:focus{
      outline:2px solid #93c5fd;
      border-color:#60a5fa;
    }

    button{
      border:none;
      background:#2563eb;
      color:#fff;
      font-weight:800;
      cursor:pointer;
    }

    .result-box{
      margin-top:14px;
      padding:14px;
      border:1px dashed #cbd5e1;
      border-radius:12px;
      background:#f8fafc;
      min-height:60px;
      display:grid;
      place-items:center;
      text-align:center;
      line-height:1.6;
    }

    @media (max-width: 640px){
      .row{
        grid-template-columns:1fr;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <h1>Weekday Planner</h1>

    <div class="row">
      <div>
        <label for="dayInput">اكتب يوم من أيام الأسبوع</label>
        <input id="dayInput" type="text" placeholder="مثال: Friday" />
      </div>

      <div>
        <label>&nbsp;</label>
        <button id="checkBtn">اعرض الرسالة</button>
      </div>
    </div>

    <div class="result-box" id="result">
      اكتب اليوم ثم اضغط على الزرار
    </div>
  </main>

  <script>
    // جلب العناصر
const dayInput = document.getElementById("dayInput");
const checkBtn = document.getElementById("checkBtn");
const result = document.getElementById("result");

// التعامل مع الزرار
checkBtn.addEventListener("click", function () {
  const userDay = dayInput.value.trim().toLowerCase();

  if (userDay === "") {
    result.textContent = "من فضلك اكتب يوم من أيام الأسبوع 🗓️";
    return;
  }

  switch (userDay) {
    case "الجمعة":
      result.textContent = "جمعة مباركة 🌸✨ خليك قريب من ربنا وخد يومك براحة وطمأنينة 🤍";
      break;

    case "السبت":
    case "الأحد":
      result.textContent = "ويك إند سعيد 😍🔥 اشحن طاقتك وابدأ أسبوعك الجديد بحماس 💪";
      break;

    case "الاثنين":
    case "الإثنين":
      result.textContent = "الاثنين بداية جديدة 🚀 شد حيلك وابدأ أسبوعك بقوة 💪";
      break;

    case "الثلاثاء":
      result.textContent = "أنت ماشي كويس جدًا 🌟 كمّل، كل خطوة صغيرة بتفرق 👏";
      break;

    case "الأربعاء":
      result.textContent = "الأربعاء يعني أنت في النص تمامًا 😎 كمّل بنفس التركيز، أنت قدها 🔥";
      break;

    case "الخميس":
      result.textContent = "الخميس قرب يخلص الأسبوع 🎉 أنجز اللي عليك وختمها بشكل قوي ✨";
      break;

    default:
      result.textContent = "اكتب يوم صحيح بالعربي مثل: السبت، الأحد، الاثنين... 📝";
  }
});
  </script>
</body>
</html>
