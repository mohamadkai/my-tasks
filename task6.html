<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Product Pricing Tool</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      color: #fff;
    }

    .container {
      width: 100%;
      max-width: 700px;
      background-color: #111827;
      border: 1px solid #334155;
      border-radius: 18px;
      padding: 24px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
    }

    h1 {
      text-align: center;
      margin-bottom: 12px;
      color: #f8fafc;
    }

    .description {
      text-align: center;
      color: #cbd5e1;
      margin-bottom: 24px;
      line-height: 1.8;
      font-size: 15px;
    }

    .form-group {
      margin-bottom: 18px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-weight: bold;
      color: #e2e8f0;
    }

    input {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid #475569;
      background-color: #0f172a;
      color: #fff;
      font-size: 15px;
      outline: none;
    }

    input::placeholder {
      color: #94a3b8;
    }

    .buttons {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 10px;
    }

    button {
      border: none;
      padding: 12px 18px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 15px;
      font-weight: bold;
      transition: 0.3s;
    }

    #calculateBtn {
      background-color: #22c55e;
      color: #052e16;
    }

    #resetBtn {
      background-color: #f59e0b;
      color: #422006;
    }

    button:hover {
      opacity: 0.9;
      transform: translateY(-2px);
    }

    .result-box {
      margin-top: 24px;
      padding: 18px;
      border-radius: 14px;
      background-color: #0f172a;
      border: 1px solid #334155;
      min-height: 80px;
      line-height: 1.8;
      color: #e2e8f0;
    }

    .result-title {
      font-weight: bold;
      color: #22c55e;
      margin-bottom: 10px;
    }

    .error {
      color: #fca5a5;
      font-weight: bold;
    }

    .success {
      color: #86efac;
      font-weight: bold;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>Product Pricing Tool</h1>
    

    <div class="form-group">
      <label for="productName">اسم المنتج</label>
      <input type="text" id="productName" placeholder="مثال: Laptop" />
    </div>

    <div class="form-group">
      <label for="productPrices">أسعار المنتج</label>
      <input type="text" id="productPrices" placeholder="مثال: 1000, 500, 250" />
    </div>

    <div class="buttons">
      <button id="calculateBtn" type="button">احسب السعر النهائي</button>
      <button id="resetBtn" type="button">إعادة ضبط</button>
    </div>

    <div id="resultBox" class="result-box">
    </div>
  </div>

  <script>
  // جلب عناصر الصفحة
  let productNameInput = document.getElementById("productName");
  let productPricesInput = document.getElementById("productPrices");
  let calculateBtn = document.getElementById("calculateBtn");
  let resetBtn = document.getElementById("resetBtn");
  let resultBox = document.getElementById("resultBox");

  // Function لتحويل النص إلى Array أسعار
  function getPricesArray(pricesText) {
    // تقسيم النص عند كل فاصلة
    let pricesArray = pricesText.split(",");

    // إرجاع الـ Array
    return pricesArray;
  }

  // Function لحساب مجموع الأسعار
  function calculateTotal(pricesArray) {
    // متغير لتجميع الأسعار
    let total = 0;

    // Loop على كل عنصر داخل الـ Array
    for (let i = 0; i < pricesArray.length; i++) {
      // حذف المسافات الزائدة من كل عنصر
      let currentPrice = pricesArray[i].trim();

      // تحويل العنصر من نص إلى رقم
      let priceNumber = Number(currentPrice);

      // جمع السعر داخل المجموع
      total = total + priceNumber;
    }

    // إرجاع المجموع
    return total;
  }

  // Function لحساب الضريبة
  function calculateTax(total) {
    // حساب 14% ضريبة
    let tax = total * 0.14;

    // إرجاع الضريبة
    return tax;
  }

  // Function لحساب السعر النهائي
  function calculateFinalPrice(total, tax) {
    // جمع المجموع مع الضريبة
    let finalPrice = total + tax;

    // إرجاع السعر النهائي
    return finalPrice;
  }

  // Function لعرض النتيجة
  function displayResult(productName, total, tax, finalPrice) {
    resultBox.innerHTML =
      "<div class='success'>اسم المنتج: " + productName + "</div>" +
      "<div>السعر الأصلي: " + total.toFixed(2) + "</div>" +
      "<div>قيمة الضريبة: " + tax.toFixed(2) + "</div>" +
      "<div>السعر النهائي: " + finalPrice.toFixed(2) + "</div>";
  }

  // Function لعرض رسالة خطأ
  function displayError(message) {
    resultBox.innerHTML = "<div class='error'>" + message + "</div>";
  }

  // Function لإعادة الضبط
  function resetData() {
    productNameInput.value = "";
    productPricesInput.value = "";
    resultBox.innerHTML = "";
  }

  // عند الضغط على زر الحساب
  calculateBtn.onclick = function () {
    // جلب القيم من المستخدم
    let productName = productNameInput.value.trim();
    let pricesText = productPricesInput.value.trim();

    // التحقق من اسم المنتج
    if (productName === "") {
      displayError("من فضلك اكتب اسم المنتج");
      return;
    }

    // التحقق من الأسعار
    if (pricesText === "") {
      displayError("من فضلك اكتب الأسعار");
      return;
    }

    // تحويل النص إلى Array
    let pricesArray = getPricesArray(pricesText);

    // حساب المجموع
    let total = calculateTotal(pricesArray);

    // حساب الضريبة
    let tax = calculateTax(total);

    // حساب السعر النهائي
    let finalPrice = calculateFinalPrice(total, tax);

    // عرض النتيجة
    displayResult(productName, total, tax, finalPrice);
  };

  // عند الضغط على زر إعادة الضبط
  resetBtn.onclick = function () {
    resetData();
  };
</script>
</body>
</html>
